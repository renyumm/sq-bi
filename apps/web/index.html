<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="确定性语义架构的工业级智能精准问数与报表分析系统。" />
    <title>SQ-BI 智能精准问数平台</title>
    <script>
      // Set background immediately to match App's bg-slate-50 (#f8fafc).
      // Runs synchronously before first paint — eliminates white flash on load.
      // darkMode is currently hardcoded false in App; update here when that changes.
      document.documentElement.style.background = '#f8fafc';
      document.documentElement.style.colorScheme = 'light';
    </script>
    <style>
      /* Inline loading shell — visible before React mounts, hidden once #root has children */
      #loading-shell {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8fafc;
        font-family: system-ui, -apple-system, sans-serif;
        z-index: 9999;
      }
      #loading-shell .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #e2e8f0;
        border-top-color: #1E56A0;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      /* Hide shell once React has populated #root */
      #root:not(:empty) ~ #loading-shell { display: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="loading-shell"><div class="spinner"></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
