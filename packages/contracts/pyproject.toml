[project]
name = "sq-bi-contracts"
version = "0.1.0"
description = "Shared domain contracts and API schemas for the SQ-BI product."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.9.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sq_bi_contracts"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
