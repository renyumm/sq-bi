skills:
  - skill_id: "tms_system_askdata"
    namespace: "tms"
    name: "TMS 系统问数"
    skill_type: "report"
    visibility: "official"
    description: "面向 TMS_ORACLE Oracle 库的受控自然语言问数 Skill，覆盖项目、发货申请、发货制单、发货执行、签收、承运商履约和 RFQ 分析。"
    permission_tags: ["tms_analyst"]
    synonyms: ["TMS 问数", "智慧问数", "TMS 自然语言查询", "受控 SQL 问数"]
    parameters:
      - name: "question"
        data_type: "String"
        required: true
        description: "用户自然语言问题"
        allowed_values: []
      - name: "time_range"
        data_type: "TimeRange"
        required: false
        description: "默认按问题中的时间表达理解；未说明时优先补最近业务周期"
        allowed_values: []
    output_schema:
      allowed_tables:
        - "HR_PROJECT_BASE"
        - "HR_DELIVER_APPLY"
        - "HR_DELIVER_FORM"
        - "HR_DELIVER_CARRY"
        - "HR_RECEPIT_CONFIRM"
        - "HR_SUPPLIER_INFO"
        - "HR_TRANSPORT_DETAIL"
        - "HR_DICT"
        - "RFQ_PROJECT_BASE"
        - "RFQ_ENQUIRY_INFO"
        - "RFQ_SUPPLIER_INFO"
        - "RFQ_TRANSPORT_DETAIL"
      forbidden_patterns: ["*_COPY", "TEMP_*", "*_2025*", "*_A"]
      join_paths:
        - "HR_PROJECT_BASE.ID = HR_DELIVER_APPLY.PROJECT_ID"
        - "HR_PROJECT_BASE.ID = HR_DELIVER_CARRY.PROJECT_ID"
        - "HR_DELIVER_APPLY.APPLY_NO = HR_DELIVER_FORM.APPLY_NO"
        - "HR_DELIVER_FORM.DELIVER_NO = HR_DELIVER_CARRY.DELIVER_NO"
        - "HR_DELIVER_CARRY.DELIVER_NO = HR_RECEPIT_CONFIRM.DELIVER_NO"
      metrics:
        - "发货申请量"
        - "发货制单量"
        - "执行单量"
        - "已签收量"
        - "运输中单量"
        - "准时到货率"
        - "延期单量"
        - "签收完成率"
        - "RFQ 报价响应率"
      analysisMethod: "由大模型根据用户问题选择指标、维度和时间条件，生成只读 SELECT，并返回中文展示列、图表建议和血缘信息。"
      outputFormat: "mixed_report"
      steps:
        - "识别用户问题中的指标、时间、厂区、项目、承运商、运输方式或 RFQ 维度。"
        - "从语义目录选择最小必要表和指标口径，缺参时软提示并继续尝试执行。"
        - "生成只读 SELECT，列别名和展示元数据由大模型直接输出中文。"
        - "执行查询并返回表格、图表建议、口径解释和下一问建议。"
      sql: "select (select count(distinct a.APPLY_NO) from HR_DELIVER_APPLY a) as apply_count, (select count(distinct f.DELIVER_NO) from HR_DELIVER_FORM f) as form_count, (select count(distinct c.DELIVER_NO) from HR_DELIVER_CARRY c) as execution_count, (select count(distinct r.DELIVER_NO) from HR_RECEPIT_CONFIRM r) as signed_count, (select count(distinct c.DELIVER_NO) from HR_DELIVER_CARRY c where c.CAR_STATUS = '3') as in_transit_count, (select count(distinct c.DELIVER_NO) from HR_DELIVER_CARRY c left join HR_RECEPIT_CONFIRM r on r.DELIVER_NO = c.DELIVER_NO where r.DELIVER_NO is null) as unsigned_count, (select round(100 * count(case when c.ACTUAL_TIME <= c.PLAN_TIME then 1 end) / nullif(count(case when c.PLAN_TIME is not null and c.ACTUAL_TIME is not null then 1 end), 0), 2) from HR_DELIVER_CARRY c where c.PLAN_TIME is not null and c.ACTUAL_TIME is not null) as ontime_rate, (select count(distinct c.DELIVER_NO) from HR_DELIVER_CARRY c where c.ACTUAL_TIME > c.PLAN_TIME and c.PLAN_TIME is not null and c.ACTUAL_TIME is not null) as delayed_count, (select round(100 * count(case when c.ACTUAL_TIME > c.PLAN_TIME then 1 end) / nullif(count(case when c.PLAN_TIME is not null and c.ACTUAL_TIME is not null then 1 end), 0), 2) from HR_DELIVER_CARRY c where c.PLAN_TIME is not null and c.ACTUAL_TIME is not null) as delayed_rate, (select round(100 * count(distinct r.DELIVER_NO) / nullif(count(distinct c.DELIVER_NO), 0), 2) from HR_DELIVER_CARRY c left join HR_RECEPIT_CONFIRM r on r.DELIVER_NO = c.DELIVER_NO) as signed_rate, (select round(100 * count(distinct case when r.DELIVER_NO is null then c.DELIVER_NO end) / nullif(count(distinct c.DELIVER_NO), 0), 2) from HR_DELIVER_CARRY c left join HR_RECEPIT_CONFIRM r on r.DELIVER_NO = c.DELIVER_NO) as unsigned_rate from DUAL"
      time_fields:
        HR_DELIVER_APPLY: "DELIVER_DATE"
        HR_DELIVER_FORM: "DELIVER_DATE"
        HR_DELIVER_CARRY: "DELIVER_DATE"
        HR_RECEPIT_CONFIRM: "HR_HANDLE_DATE"
      chartType: "mixed_report"

  - skill_id: "tms_carrier_performance"
    namespace: "tms"
    name: "承运商履约分析"
    skill_type: "metric"
    visibility: "official"
    description: "分析承运商的发货量和到货准时率，进行履约考核"
    permission_tags: ["tms_analyst"]
    synonyms: ["承运商分析", "承运商表现"]
    parameters:
      - name: "time_range"
        data_type: "TimeRange"
        required: true
        description: "分析时间范围"
        allowed_values: []
      - name: "factory"
        data_type: "Factory"
        required: false
        description: "厂区或大区过滤条件"
        allowed_values: []
      - name: "carrier"
        data_type: "String"
        required: false
        description: "指定承运商；为空时分析全部承运商"
        allowed_values: []
    output_schema:
      metrics: ["承运商承运量", "承运商准时到货率", "承运商延期单量", "平均延期小时"]
      dimensions: ["承运商", "厂区", "时间范围"]
      default_time_range: "本月"
      analysisMethod: "按承运商聚合承运量、准时率、延期单量和平均延期小时，结合样本量过滤识别高风险承运商与稳定承运商。"
      outputFormat: "mixed_report"
      steps:
        - "读取时间范围和厂区条件，缺失时使用对话上下文并在回复里提示假设。"
        - "按承运商统计承运量、准时到货率、延期单量和平均延期小时。"
        - "按承运量设置最低样本阈值，避免小样本承运商误判。"
        - "输出 Top/Bottom 承运商排行、异常原因线索和替换/约谈建议。"
      sql: "select f.CARRIER_NAME as carrier_name, count(distinct c.DELIVER_NO) as shipment_count, round(100 * count(case when c.ACTUAL_TIME <= c.PLAN_TIME then 1 end) / nullif(count(case when c.PLAN_TIME is not null and c.ACTUAL_TIME is not null then 1 end), 0), 2) as ontime_rate, count(case when c.ACTUAL_TIME > c.PLAN_TIME and c.PLAN_TIME is not null and c.ACTUAL_TIME is not null then 1 end) as delay_count, round(avg(case when c.ACTUAL_TIME > c.PLAN_TIME and c.PLAN_TIME is not null and c.ACTUAL_TIME is not null then (c.ACTUAL_TIME - c.PLAN_TIME) * 24 end), 2) as avg_delay_hours from HR_DELIVER_CARRY c join HR_DELIVER_FORM f on f.DELIVER_NO = c.DELIVER_NO where f.CARRIER_NAME is not null group by f.CARRIER_NAME order by delay_count desc, shipment_count desc fetch first 20 rows only"
      time_fields:
        HR_DELIVER_CARRY: "DELIVER_DATE"
      chartType: "bar"

  - skill_id: "tms_transport_mode_distribution"
    namespace: "tms"
    name: "运输方式分布分析"
    skill_type: "metric"
    visibility: "official"
    description: "按运输方式统计发货申请量分布和占比，运输方式优先通过 HR_DICT.TYPE=2 翻译。"
    permission_tags: ["tms_analyst"]
    synonyms: ["运输方式分布", "运输方式占比", "提货方式分布"]
    parameters:
      - name: "time_range"
        data_type: "TimeRange"
        required: true
        description: "统计时间范围"
        allowed_values: []
      - name: "factory"
        data_type: "Factory"
        required: false
        description: "厂区或大区过滤条件"
        allowed_values: []
    output_schema:
      metrics: ["运输方式申请量"]
      dimensions: ["运输方式"]
      default_time_range: "本月"
      analysisMethod: "按运输方式统计申请量和占比，结合字典翻译识别运输方式结构变化。"
      outputFormat: "chart"
      steps:
        - "解析时间范围和厂区条件，读取发货申请表运输方式字段。"
        - "通过 HR_DICT 将运输方式编码翻译为业务名称。"
        - "计算各运输方式申请量、占比和环比变化。"
        - "输出结构占比图和异常运输方式提醒。"
      sql: "select coalesce(d.DESCRIBE, a.TRANSPORT_TYPE) as transport_type_name, count(distinct a.APPLY_NO) as apply_count from HR_DELIVER_APPLY a left join HR_DICT d on d.TYPE = '2' and d.CODE = a.TRANSPORT_TYPE where a.TRANSPORT_TYPE is not null group by coalesce(d.DESCRIBE, a.TRANSPORT_TYPE) order by apply_count desc"
      time_fields:
        HR_DELIVER_APPLY: "DELIVER_DATE"
      chartType: "bar"

  - skill_id: "tms_logistics_risk_scan"
    namespace: "tms"
    name: "物流风险扫描"
    skill_type: "report"
    visibility: "official"
    description: "扫描准时到货率、未签收积压、在途单量和延期项目，定位本月物流风险。"
    permission_tags: ["tms_analyst"]
    synonyms: ["物流风险", "运输风险", "风险扫描"]
    parameters:
      - name: "time_range"
        data_type: "TimeRange"
        required: true
        description: "风险扫描时间范围"
        allowed_values: []
      - name: "factory"
        data_type: "Factory"
        required: false
        description: "厂区或大区过滤条件"
        allowed_values: []
      - name: "risk_level"
        data_type: "String"
        required: false
        description: "关注的风险等级，如红色、黄色、全部"
        allowed_values: ["全部", "红色", "黄色"]
    output_schema:
      metrics: ["准时到货率", "延期率", "未签收单量", "未签收率", "运输中单量", "项目发货量"]
      dimensions: ["厂区", "项目", "承运商", "时间范围"]
      sections: ["时效水位", "签收积压", "在途积压", "延期项目", "行动建议"]
      analysisMethod: "先计算时效、签收和在途三类风险水位，再按项目/承运商定位风险集中来源，最后输出管理动作。"
      outputFormat: "mixed_report"
      steps:
        - "读取时间范围、厂区和项目上下文，生成风险扫描运行条件。"
        - "计算准时到货率、延期率、未签收单量、未签收率和在途单量。"
        - "按项目和承运商拆解延期、未签收和在途积压来源。"
        - "按影响量和异常程度生成红黄绿风险等级。"
        - "输出风险表、风险原因线索和下一步处理建议。"
      sql: "select c.PROJECT_ID as project_id, p.PROJECT_NAME as project_name, p.DELIVERY_FACTORY as delivery_factory, count(distinct c.DELIVER_NO) as execution_count, round(100 * count(case when c.ACTUAL_TIME <= c.PLAN_TIME then 1 end) / nullif(count(case when c.PLAN_TIME is not null and c.ACTUAL_TIME is not null then 1 end), 0), 2) as ontime_rate, count(case when c.ACTUAL_TIME > c.PLAN_TIME and c.PLAN_TIME is not null and c.ACTUAL_TIME is not null then 1 end) as delayed_count, count(case when c.CAR_STATUS = '3' then 1 end) as in_transit_count, count(distinct case when r.DELIVER_NO is null then c.DELIVER_NO end) as unsigned_count from HR_DELIVER_CARRY c left join HR_PROJECT_BASE p on p.ID = c.PROJECT_ID left join HR_RECEPIT_CONFIRM r on r.DELIVER_NO = c.DELIVER_NO group by c.PROJECT_ID, p.PROJECT_NAME, p.DELIVERY_FACTORY order by delayed_count desc, unsigned_count desc fetch first 20 rows only"
      time_fields:
        HR_DELIVER_CARRY: "DELIVER_DATE"
      chartType: "mixed_report"

  - skill_id: "tms_fulfillment_exception"
    namespace: "tms"
    name: "履约异常诊断"
    skill_type: "report"
    visibility: "official"
    description: "从运输执行到签收完成诊断履约异常，输出项目级异常线索。"
    permission_tags: ["tms_analyst"]
    synonyms: ["履约异常", "签收异常", "异常诊断"]
    parameters:
      - name: "time_range"
        data_type: "TimeRange"
        required: true
        description: "诊断时间范围"
        allowed_values: []
      - name: "factory"
        data_type: "Factory"
        required: false
        description: "厂区或大区过滤条件"
        allowed_values: []
      - name: "project"
        data_type: "String"
        required: false
        description: "指定项目；为空时分析全部项目"
        allowed_values: []
    output_schema:
      metrics: ["执行单量", "签收完成率", "未签收单量", "未签收率", "延期单量", "平均延期小时"]
      dimensions: ["项目", "厂区", "承运商", "执行状态"]
      sections: ["签收闭环", "在途执行", "时效表现", "异常项目", "责任线索"]
      analysisMethod: "从执行单到签收确认做闭环诊断，识别未签收、延期、在途积压和状态回传异常。"
      outputFormat: "mixed_report"
      steps:
        - "关联执行单和签收确认单，形成履约闭环视图。"
        - "计算签收完成率、未签收单量、延期单量和平均延期小时。"
        - "按项目、承运商和状态拆解异常集中点。"
        - "输出异常明细快照、处理优先级和责任协同建议。"
      sql: "select c.PROJECT_ID as project_id, p.PROJECT_NAME as project_name, p.DELIVERY_FACTORY as delivery_factory, f.CARRIER_NAME as carrier_name, count(distinct c.DELIVER_NO) as execution_count, count(distinct r.DELIVER_NO) as signed_count, count(distinct case when r.DELIVER_NO is null then c.DELIVER_NO end) as unsigned_count, round(100 * count(distinct r.DELIVER_NO) / nullif(count(distinct c.DELIVER_NO), 0), 2) as signed_rate, count(case when c.ACTUAL_TIME > c.PLAN_TIME and c.PLAN_TIME is not null and c.ACTUAL_TIME is not null then 1 end) as delayed_count from HR_DELIVER_CARRY c left join HR_DELIVER_FORM f on f.DELIVER_NO = c.DELIVER_NO left join HR_PROJECT_BASE p on p.ID = c.PROJECT_ID left join HR_RECEPIT_CONFIRM r on r.DELIVER_NO = c.DELIVER_NO group by c.PROJECT_ID, p.PROJECT_NAME, p.DELIVERY_FACTORY, f.CARRIER_NAME order by unsigned_count desc, delayed_count desc fetch first 20 rows only"
      time_fields:
        HR_DELIVER_CARRY: "DELIVER_DATE"
      chartType: "table"

  - skill_id: "tms_project_delay_analysis"
    namespace: "tms"
    name: "项目延期分析"
    skill_type: "metric"
    visibility: "official"
    description: "按项目统计最近 7 天延期到货单量，识别延期最集中的项目。"
    permission_tags: ["tms_analyst"]
    synonyms: ["项目延期", "延期项目", "延期排行"]
    parameters:
      - name: "time_range"
        data_type: "TimeRange"
        required: true
        description: "延期分析时间范围"
        allowed_values: []
      - name: "factory"
        data_type: "Factory"
        required: false
        description: "厂区或大区过滤条件"
        allowed_values: []
      - name: "project"
        data_type: "String"
        required: false
        description: "指定项目；为空时输出延期项目排行"
        allowed_values: []
    output_schema:
      metrics: ["项目发货量", "延期单量", "延期率", "平均延期小时"]
      dimensions: ["项目", "厂区", "大区", "时间范围"]
      columns: ["项目", "发货量", "延期单量", "延期率", "平均延期小时"]
      analysisMethod: "按项目聚合发货量和延期表现，结合项目样本量识别延期集中项目和高延期率项目。"
      outputFormat: "table"
      steps:
        - "解析时间范围、厂区或大区条件，锁定项目维度。"
        - "按项目统计发货量、延期单量、延期率和平均延期小时。"
        - "区分高影响项目和高比例异常项目，避免只看单一排序。"
        - "输出项目排行、异常项目清单和追责/协同建议。"
      sql: "select c.PROJECT_ID as project_id, p.PROJECT_NAME as project_name, p.DELIVERY_FACTORY as delivery_factory, count(distinct c.DELIVER_NO) as shipment_count, count(case when c.ACTUAL_TIME > c.PLAN_TIME and c.PLAN_TIME is not null and c.ACTUAL_TIME is not null then 1 end) as delayed_count, round(100 * count(case when c.ACTUAL_TIME > c.PLAN_TIME then 1 end) / nullif(count(case when c.PLAN_TIME is not null and c.ACTUAL_TIME is not null then 1 end), 0), 2) as delayed_rate, round(avg(case when c.ACTUAL_TIME > c.PLAN_TIME and c.PLAN_TIME is not null and c.ACTUAL_TIME is not null then (c.ACTUAL_TIME - c.PLAN_TIME) * 24 end), 2) as avg_delay_hours from HR_DELIVER_CARRY c left join HR_PROJECT_BASE p on p.ID = c.PROJECT_ID group by c.PROJECT_ID, p.PROJECT_NAME, p.DELIVERY_FACTORY order by delayed_count desc, delayed_rate desc fetch first 20 rows only"
      time_fields:
        HR_DELIVER_CARRY: "DELIVER_DATE"
      chartType: "bar"

  - skill_id: "tms_rfq_analysis"
    namespace: "tms"
    name: "RFQ 询比价分析"
    skill_type: "report"
    visibility: "official"
    description: "分析 RFQ 询价单量和供应商报价次数，支持本月询价规模、RFQ 项目对比、运输方式对比和供应商报价排行；当前 RFQ 数据目录没有区域/大区物理字段。"
    permission_tags: ["tms_analyst"]
    synonyms: ["询比价分析", "询价分析", "供应商报价分析", "RFQ 分析"]
    parameters:
      - name: "time_range"
        data_type: "TimeRange"
        required: true
        description: "RFQ 分析时间范围"
        allowed_values: []
      - name: "project"
        data_type: "String"
        required: false
        description: "RFQ 项目过滤条件"
        allowed_values: []
      - name: "supplier"
        data_type: "String"
        required: false
        description: "供应商过滤条件"
        allowed_values: []
    output_schema:
      metrics: ["询价单量", "供应商报价次数", "RFQ 报价响应率"]
      dimensions: ["供应商", "RFQ 项目", "运输方式"]
      default_time_range: "本月"
      analysisMethod: "按 RFQ 项目、运输方式和供应商统计询价、报价和响应率，定位报价不足和供应商参与度低的问题；若用户要求按区域/大区对比，当前目录无 AREA/REGION 字段，需用 RFQ 项目维度代理并说明。"
      outputFormat: "mixed_report"
      steps:
        - "读取 RFQ 询价、项目、运输明细和供应商报价数据，解析时间和项目条件。"
        - "计算询价单量、供应商报价次数和 RFQ 报价响应率。"
        - "区域/大区请求不得使用 AREA/REGION 伪字段；当前只能按 RFQ 项目或运输方式代理对比。"
        - "按供应商识别高响应、低响应和未响应对象。"
        - "输出供应商报价排行、响应不足项目和采购协同建议。"
      sql: "select coalesce(q.SUPPLIER_NAME, '未报价') as supplier_name, count(distinct e.ENQUIRY_NO) as enquiry_count, count(q.ENQUIRY_NO) as quotation_count, round(100 * count(distinct q.ENQUIRY_NO) / nullif(count(distinct e.ENQUIRY_NO), 0), 2) as response_rate from RFQ_ENQUIRY_INFO e left join RFQ_SUPPLIER_INFO q on q.ENQUIRY_NO = e.ENQUIRY_NO group by coalesce(q.SUPPLIER_NAME, '未报价') order by quotation_count desc, enquiry_count desc fetch first 20 rows only"
      time_fields:
        RFQ_ENQUIRY_INFO: "CREATED_TIME"
      chartType: "bar"
