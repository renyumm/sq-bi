data_sources:
  - data_source_id: "oracle_tms"
    name: "TMS Oracle"
    database_type: "oracle"
    connection_alias: "TMS_ORACLE"
    is_read_only: true
    owner: "admin"
    description: "Primary Oracle database for TMS data"
    tags: ["production", "tms"]

tables:
  - table_id: "hr_project_base"
    data_source_id: "oracle_tms"
    physical_name: "HR_PROJECT_BASE"
    business_name: "项目基础信息表"
    description: "项目维度的基础信息，包括项目编码、项目名称等。"
    owner: "admin"
    tags: ["dimension", "project"]

  - table_id: "hr_deliver_apply"
    data_source_id: "oracle_tms"
    physical_name: "HR_DELIVER_APPLY"
    business_name: "发货申请表"
    description: "记录发货申请信息"
    owner: "admin"
    tags: ["fact", "shipping"]

  - table_id: "hr_deliver_form"
    data_source_id: "oracle_tms"
    physical_name: "HR_DELIVER_FORM"
    business_name: "发货制单表"
    description: "记录实际发货制单信息"
    owner: "admin"
    tags: ["fact", "shipping"]

  - table_id: "hr_deliver_carry"
    data_source_id: "oracle_tms"
    physical_name: "HR_DELIVER_CARRY"
    business_name: "发货执行表"
    description: "记录执行层面的运输车辆状态、计划和实际到货时间"
    owner: "admin"
    tags: ["fact", "execution"]

  - table_id: "hr_recepit_confirm"
    data_source_id: "oracle_tms"
    physical_name: "HR_RECEPIT_CONFIRM"
    business_name: "签收确认表"
    description: "记录签收确认状态以及处理时间"
    owner: "admin"
    tags: ["fact", "receipt"]

  - table_id: "hr_dict"
    data_source_id: "oracle_tms"
    physical_name: "HR_DICT"
    business_name: "TMS 字典表"
    description: "运输方式、状态等业务字典映射。"
    owner: "admin"
    tags: ["dimension", "dictionary"]

  - table_id: "hr_supplier_info"
    data_source_id: "oracle_tms"
    physical_name: "HR_SUPPLIER_INFO"
    business_name: "TMS 供应商信息表"
    description: "记录项目相关供应商信息，用于供应商维度分析。"
    owner: "admin"
    tags: ["dimension", "supplier"]

  - table_id: "hr_transport_detail"
    data_source_id: "oracle_tms"
    physical_name: "HR_TRANSPORT_DETAIL"
    business_name: "TMS 运输明细表"
    description: "记录项目关联的运输线路、运输方式和运输明细。"
    owner: "admin"
    tags: ["fact", "transport"]

  - table_id: "rfq_project_base"
    data_source_id: "oracle_tms"
    physical_name: "RFQ_PROJECT_BASE"
    business_name: "RFQ 项目基础表"
    description: "记录询比价项目基础信息。"
    owner: "admin"
    tags: ["dimension", "rfq", "project"]

  - table_id: "rfq_enquiry_info"
    data_source_id: "oracle_tms"
    physical_name: "RFQ_ENQUIRY_INFO"
    business_name: "询价主表"
    description: "记录 TMS 询比价询价单主信息。"
    owner: "admin"
    tags: ["fact", "rfq"]

  - table_id: "rfq_supplier_info"
    data_source_id: "oracle_tms"
    physical_name: "RFQ_SUPPLIER_INFO"
    business_name: "供应商报价表"
    description: "记录供应商针对询价单的报价参与信息。"
    owner: "admin"
    tags: ["fact", "rfq"]

  - table_id: "rfq_transport_detail"
    data_source_id: "oracle_tms"
    physical_name: "RFQ_TRANSPORT_DETAIL"
    business_name: "RFQ 运输明细表"
    description: "记录询比价场景下的运输线路和报价明细。"
    owner: "admin"
    tags: ["fact", "rfq", "transport"]

