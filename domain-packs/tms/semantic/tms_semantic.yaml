metrics:
  - metric_code: "apply_count"
    name: "发货申请量"
    definition: "发货申请的总量"
    visibility: "official"
    logical_formula:
      expression: "count_distinct(apply_no)"
      referenced_standard_fields: ["apply_no"]
    formula:
      expression: "select count(distinct a.APPLY_NO) as apply_count from HR_DELIVER_APPLY a"
      numerator: "APPLY_NO"
      denominator: null
      filters: []
      time_field: "DELIVER_DATE"
    data_source_id: "oracle_tms"
    owner: "admin"
    version: "1.0.0"
    synonyms: ["发货申请", "申请单量"]

  - metric_code: "form_count"
    name: "发货制单量"
    definition: "发货制单的总量"
    visibility: "official"
    logical_formula:
      expression: "count_distinct(deliver_no)"
      referenced_standard_fields: ["deliver_no"]
      notes: "deliver_no maps to HR_DELIVER_FORM.DELIVER_NO for this metric"
    formula:
      expression: "select count(distinct f.DELIVER_NO) as form_count from HR_DELIVER_FORM f"
      numerator: "DELIVER_NO"
      denominator: null
      filters: []
      time_field: "DELIVER_DATE"
    data_source_id: "oracle_tms"
    owner: "admin"
    version: "1.0.0"
    synonyms: ["制单量", "发货单量"]

  - metric_code: "execution_count"
    name: "执行单量"
    definition: "发货执行表中的执行单总量，按 DELIVER_NO 去重统计。"
    visibility: "official"
    logical_formula:
      expression: "count_distinct(deliver_no)"
      referenced_standard_fields: ["deliver_no"]
    formula:
      expression: "select count(distinct c.DELIVER_NO) as execution_count from HR_DELIVER_CARRY c"
      numerator: "DELIVER_NO"
      denominator: null
      filters: []
      time_field: "DELIVER_DATE"
    data_source_id: "oracle_tms"
    owner: "admin"
    version: "1.0.0"
    synonyms: ["执行量", "运输执行量", "执行发货单量"]

  - metric_code: "ontime_rate"
    name: "准时到货率"
    definition: "实际到货时间不迟于计划到货时间的执行单比例"
    visibility: "official"
    logical_formula:
      expression: "rate(actual_time <= plan_time)"
      referenced_standard_fields: ["actual_time", "plan_time"]
    formula:
      expression: "select round(100 * count(case when c.ACTUAL_TIME <= c.PLAN_TIME then 1 end) / nullif(count(case when c.PLAN_TIME is not null and c.ACTUAL_TIME is not null then 1 end), 0), 2) as ontime_rate from HR_DELIVER_CARRY c where c.PLAN_TIME is not null and c.ACTUAL_TIME is not null"
      numerator: "count(case when actual_time <= plan_time then 1 end)"
      denominator: "count(case when plan_time is not null and actual_time is not null then 1 end)"
      filters: ["plan_time is not null", "actual_time is not null"]
      time_field: "DELIVER_DATE"
    data_source_id: "oracle_tms"
    owner: "admin"
    version: "1.0.0"
    synonyms: ["准时率", "到货准时率"]

  - metric_code: "in_transit_count"
    name: "运输中单量"
    definition: "当前车辆状态为运输途中的执行单量"
    visibility: "official"
    logical_formula:
      expression: "count_distinct(deliver_no) filter(car_status = '3')"
      referenced_standard_fields: ["deliver_no", "car_status"]
    formula:
      expression: "select count(distinct c.DELIVER_NO) as in_transit_count from HR_DELIVER_CARRY c where c.CAR_STATUS = '3'"
      numerator: "DELIVER_NO"
      denominator: null
      filters: ["CAR_STATUS = '3'"]
      time_field: null
    data_source_id: "oracle_tms"
    owner: "admin"
    version: "1.0.0"
    synonyms: ["在途单量", "运输途中单量"]

  - metric_code: "unloaded_count"
    name: "已卸货单量"
    definition: "车辆状态为已卸货的执行单量"
    visibility: "official"
    logical_formula:
      expression: "count_distinct(deliver_no) filter(car_status = '5')"
      referenced_standard_fields: ["deliver_no", "car_status"]
    formula:
      expression: "select count(distinct c.DELIVER_NO) as unloaded_count from HR_DELIVER_CARRY c where c.CAR_STATUS = '5'"
      numerator: "DELIVER_NO"
      denominator: null
      filters: ["CAR_STATUS = '5'"]
      time_field: "DELIVER_DATE"
    data_source_id: "oracle_tms"
    owner: "admin"
    version: "1.0.0"
    synonyms: ["卸货单量", "已卸货量"]

  - metric_code: "signed_count"
    name: "已签收量"
    definition: "签收确认表中已完成签收的发货单量"
    visibility: "official"
    logical_formula:
      expression: "count_distinct(deliver_no)"
      referenced_standard_fields: ["deliver_no"]
      notes: "deliver_no maps to HR_RECEPIT_CONFIRM.DELIVER_NO for this metric"
    formula:
      expression: "select count(distinct r.DELIVER_NO) as signed_count from HR_RECEPIT_CONFIRM r"
      numerator: "DELIVER_NO"
      denominator: null
      filters: []
      time_field: "HR_HANDLE_DATE"
    data_source_id: "oracle_tms"
    owner: "admin"
    version: "1.0.0"
    synonyms: ["签收量", "完成量"]

  - metric_code: "unsigned_count"
    name: "未签收单量"
    definition: "执行表中存在但尚未进入签收确认的单量"
    visibility: "official"
    escape_hatch: true
    escape_hatch_reason: "anti-join across HR_DELIVER_CARRY and HR_RECEPIT_CONFIRM; DSL does not support multi-table JOINs"
    formula:
      expression: "select count(distinct c.DELIVER_NO) as unsigned_count from HR_DELIVER_CARRY c left join HR_RECEPIT_CONFIRM r on r.DELIVER_NO = c.DELIVER_NO where r.DELIVER_NO is null"
      numerator: "c.DELIVER_NO"
      denominator: null
      filters: ["r.DELIVER_NO is null"]
      time_field: "DELIVER_DATE"
    data_source_id: "oracle_tms"
    owner: "admin"
    version: "1.0.0"
    synonyms: ["未签收", "签收积压"]

  - metric_code: "carrier_shipment_count"
    name: "承运商承运量"
    definition: "按承运商统计的发货制单量"
    visibility: "official"
    escape_hatch: true
    escape_hatch_reason: "deliver_no 与 carrier_name 的默认映射跨执行表和制单表，需使用已审核物理 SQL。"
    formula:
      expression: "select f.CARRIER_NAME as carrier_name, count(distinct f.DELIVER_NO) as shipment_count from HR_DELIVER_FORM f where f.CARRIER_NAME is not null group by f.CARRIER_NAME"
      numerator: "DELIVER_NO"
      denominator: null
      filters: ["CARRIER_NAME is not null"]
      time_field: "DELIVER_DATE"
    data_source_id: "oracle_tms"
    owner: "admin"
    version: "1.0.0"
    synonyms: ["承运量", "承运商发货量"]

  - metric_code: "transport_mode_apply_count"
    name: "运输方式申请量"
    definition: "按运输方式统计的发货申请量，运输方式通过 HR_DICT.TYPE=2 翻译。"
    visibility: "official"
    logical_formula:
      expression: "count_distinct(apply_no) group_by(transport_type)"
      referenced_standard_fields: ["apply_no", "transport_type"]
    formula:
      expression: "select a.TRANSPORT_TYPE as transport_type, count(distinct a.APPLY_NO) as apply_count from HR_DELIVER_APPLY a where a.TRANSPORT_TYPE is not null group by a.TRANSPORT_TYPE"
      numerator: "APPLY_NO"
      denominator: null
      filters: ["TRANSPORT_TYPE is not null"]
      time_field: "DELIVER_DATE"
    data_source_id: "oracle_tms"
    owner: "admin"
    version: "1.0.0"
    synonyms: ["运输方式分布", "运输方式占比", "提货方式申请量"]

  - metric_code: "carrier_ontime_rate"
    name: "承运商准时到货率"
    definition: "按承运商分组计算的准时到货率"
    visibility: "official"
    escape_hatch: true
    escape_hatch_reason: "requires JOIN between HR_DELIVER_CARRY and HR_DELIVER_FORM on DELIVER_NO; DSL does not support multi-table JOINs"
    formula:
      expression: "select f.CARRIER_NAME as carrier_name, round(100 * count(case when c.ACTUAL_TIME <= c.PLAN_TIME then 1 end) / nullif(count(case when c.PLAN_TIME is not null and c.ACTUAL_TIME is not null then 1 end), 0), 2) as ontime_rate from HR_DELIVER_CARRY c join HR_DELIVER_FORM f on f.DELIVER_NO = c.DELIVER_NO where f.CARRIER_NAME is not null and c.PLAN_TIME is not null and c.ACTUAL_TIME is not null group by f.CARRIER_NAME"
      numerator: "count(case when actual_time <= plan_time then 1 end)"
      denominator: "count(case when plan_time is not null and actual_time is not null then 1 end)"
      filters: ["CARRIER_NAME is not null", "plan_time is not null", "actual_time is not null"]
      time_field: "DELIVER_DATE"
    data_source_id: "oracle_tms"
    owner: "admin"
    version: "1.0.0"
    synonyms: ["承运商准时率", "承运商时效"]

  - metric_code: "project_shipment_count"
    name: "项目发货量"
    definition: "按项目统计的发货制单量"
    visibility: "official"
    escape_hatch: true
    escape_hatch_reason: "requires JOIN between HR_DELIVER_FORM and HR_PROJECT_BASE; DSL does not support multi-table JOINs"
    formula:
      expression: "select p.PROJECT_NAME as project_name, count(distinct f.DELIVER_NO) as shipment_count from HR_DELIVER_FORM f join HR_PROJECT_BASE p on p.ID = f.PROJECT_ID group by p.PROJECT_NAME"
      numerator: "DELIVER_NO"
      denominator: null
      filters: []
      time_field: "DELIVER_DATE"
    data_source_id: "oracle_tms"
    owner: "admin"
    version: "1.0.0"
    synonyms: ["项目发货", "项目制单量"]

  - metric_code: "delayed_count"
    name: "延期单量"
    definition: "实际到货时间晚于计划到货时间的执行单量"
    visibility: "official"
    logical_formula:
      expression: "count_distinct(deliver_no) filter(actual_time > plan_time)"
      referenced_standard_fields: ["deliver_no", "actual_time", "plan_time"]
    formula:
      expression: "select count(distinct c.DELIVER_NO) as delayed_count from HR_DELIVER_CARRY c where c.ACTUAL_TIME > c.PLAN_TIME and c.PLAN_TIME is not null and c.ACTUAL_TIME is not null"
      numerator: "DELIVER_NO"
      denominator: null
      filters: ["ACTUAL_TIME > PLAN_TIME", "PLAN_TIME is not null", "ACTUAL_TIME is not null"]
      time_field: "DELIVER_DATE"
    data_source_id: "oracle_tms"
    owner: "admin"
    version: "1.0.0"
    synonyms: ["延期", "延期到货"]

  - metric_code: "enquiry_count"
    name: "询价单量"
    definition: "询价主表中的询价单数量"
    visibility: "official"
    logical_formula:
      expression: "count_distinct(enquiry_no)"
      referenced_standard_fields: ["enquiry_no"]
    formula:
      expression: "select count(distinct e.ENQUIRY_NO) as enquiry_count from RFQ_ENQUIRY_INFO e"
      numerator: "ENQUIRY_NO"
      denominator: null
      filters: []
      time_field: "CREATED_TIME"
    data_source_id: "oracle_tms"
    owner: "admin"
    version: "1.0.0"
    synonyms: ["询价量", "询价单数"]

  - metric_code: "supplier_quotation_count"
    name: "供应商报价次数"
    definition: "供应商报价记录数量"
    visibility: "official"
    escape_hatch: true
    escape_hatch_reason: "uses count(*) without a field reference; DSL requires an explicit standard field"
    formula:
      expression: "select count(*) as supplier_quotation_count from RFQ_SUPPLIER_INFO q where q.SUPPLIER_NAME is not null"
      numerator: null
      denominator: null
      filters: ["SUPPLIER_NAME is not null"]
      time_field: "CREATED_TIME"
    data_source_id: "oracle_tms"
    owner: "admin"
    version: "1.0.0"
    synonyms: ["报价次数", "供应商报价量"]

  - metric_code: "delayed_rate"
    name: "延期率"
    definition: "实际到货时间晚于计划到货时间的执行单占具备计划和实际到货时间执行单的比例。"
    visibility: "official"
    logical_formula:
      expression: "rate(actual_time > plan_time)"
      referenced_standard_fields: ["actual_time", "plan_time"]
    formula:
      expression: "select round(100 * count(case when c.ACTUAL_TIME > c.PLAN_TIME then 1 end) / nullif(count(case when c.PLAN_TIME is not null and c.ACTUAL_TIME is not null then 1 end), 0), 2) as delayed_rate from HR_DELIVER_CARRY c where c.PLAN_TIME is not null and c.ACTUAL_TIME is not null"
      numerator: "count(case when ACTUAL_TIME > PLAN_TIME then 1 end)"
      denominator: "count(case when PLAN_TIME is not null and ACTUAL_TIME is not null then 1 end)"
      filters: ["PLAN_TIME is not null", "ACTUAL_TIME is not null"]
      time_field: "DELIVER_DATE"
    data_source_id: "oracle_tms"
    owner: "admin"
    version: "1.0.0"
    synonyms: ["延期占比", "超时率", "到货延期率"]

  - metric_code: "avg_delay_hours"
    name: "平均延期小时"
    definition: "实际到货晚于计划到货的执行单平均延期时长，单位小时。"
    visibility: "official"
    escape_hatch: true
    escape_hatch_reason: "requires Oracle date arithmetic (ACTUAL_TIME - PLAN_TIME) * 24; DSL does not support date diff expressions"
    formula:
      expression: "select round(avg(case when c.ACTUAL_TIME > c.PLAN_TIME then (c.ACTUAL_TIME - c.PLAN_TIME) * 24 end), 2) as avg_delay_hours from HR_DELIVER_CARRY c where c.PLAN_TIME is not null and c.ACTUAL_TIME is not null and c.ACTUAL_TIME > c.PLAN_TIME"
      numerator: "sum(case when ACTUAL_TIME > PLAN_TIME then (cast(ACTUAL_TIME as date) - cast(PLAN_TIME as date)) * 24 end)"
      denominator: "count(case when ACTUAL_TIME > PLAN_TIME then 1 end)"
      filters: ["PLAN_TIME is not null", "ACTUAL_TIME is not null", "ACTUAL_TIME > PLAN_TIME"]
      time_field: "DELIVER_DATE"
    data_source_id: "oracle_tms"
    owner: "admin"
    version: "1.0.0"
    synonyms: ["平均超时时长", "延期小时", "到货超时小时"]

  - metric_code: "signed_rate"
    name: "签收完成率"
    definition: "已签收发货单占执行发货单的比例，用于衡量执行到签收闭环完成情况。"
    visibility: "official"
    escape_hatch: true
    escape_hatch_reason: "requires LEFT JOIN between HR_DELIVER_CARRY and HR_RECEPIT_CONFIRM; DSL does not support multi-table JOINs"
    formula:
      expression: "select round(100 * count(distinct r.DELIVER_NO) / nullif(count(distinct c.DELIVER_NO), 0), 2) as signed_rate from HR_DELIVER_CARRY c left join HR_RECEPIT_CONFIRM r on r.DELIVER_NO = c.DELIVER_NO"
      numerator: "count(distinct r.DELIVER_NO)"
      denominator: "count(distinct c.DELIVER_NO)"
      filters: []
      time_field: "DELIVER_DATE"
    data_source_id: "oracle_tms"
    owner: "admin"
    version: "1.0.0"
    synonyms: ["签收率", "闭环完成率", "签收闭环率"]

  - metric_code: "unsigned_rate"
    name: "未签收率"
    definition: "未进入签收确认的执行发货单占执行发货单比例，用于识别签收积压风险。"
    visibility: "official"
    escape_hatch: true
    escape_hatch_reason: "requires LEFT JOIN between HR_DELIVER_CARRY and HR_RECEPIT_CONFIRM with anti-join pattern; DSL does not support multi-table JOINs"
    formula:
      expression: "select round(100 * count(distinct case when r.DELIVER_NO is null then c.DELIVER_NO end) / nullif(count(distinct c.DELIVER_NO), 0), 2) as unsigned_rate from HR_DELIVER_CARRY c left join HR_RECEPIT_CONFIRM r on r.DELIVER_NO = c.DELIVER_NO"
      numerator: "count(case when r.DELIVER_NO is null then c.DELIVER_NO end)"
      denominator: "count(distinct c.DELIVER_NO)"
      filters: []
      time_field: "DELIVER_DATE"
    data_source_id: "oracle_tms"
    owner: "admin"
    version: "1.0.0"
    synonyms: ["未签收占比", "签收积压率"]

  - metric_code: "carrier_delay_count"
    name: "承运商延期单量"
    definition: "按承运商统计的延期到货执行单量，用于承运商履约异常定位。"
    visibility: "official"
    escape_hatch: true
    escape_hatch_reason: "requires JOIN between HR_DELIVER_CARRY and HR_DELIVER_FORM; DSL does not support multi-table JOINs"
    formula:
      expression: "select f.CARRIER_NAME as carrier_name, count(distinct c.DELIVER_NO) as carrier_delay_count from HR_DELIVER_CARRY c join HR_DELIVER_FORM f on f.DELIVER_NO = c.DELIVER_NO where f.CARRIER_NAME is not null and c.ACTUAL_TIME > c.PLAN_TIME and c.PLAN_TIME is not null and c.ACTUAL_TIME is not null group by f.CARRIER_NAME"
      numerator: "DELIVER_NO"
      denominator: null
      filters: ["CARRIER_NAME is not null", "ACTUAL_TIME > PLAN_TIME", "PLAN_TIME is not null", "ACTUAL_TIME is not null"]
      time_field: "DELIVER_DATE"
    data_source_id: "oracle_tms"
    owner: "admin"
    version: "1.0.0"
    synonyms: ["承运商延期", "承运商超时单量"]

  - metric_code: "rfq_response_rate"
    name: "RFQ 报价响应率"
    definition: "有供应商报价记录的 RFQ 询价占询价单量的比例，用于衡量询比价响应充分性。"
    visibility: "official"
    escape_hatch: true
    escape_hatch_reason: "requires LEFT JOIN between RFQ_ENQUIRY_INFO and RFQ_SUPPLIER_INFO; DSL does not support multi-table JOINs"
    formula:
      expression: "select round(100 * count(distinct q.ENQUIRY_NO) / nullif(count(distinct e.ENQUIRY_NO), 0), 2) as rfq_response_rate from RFQ_ENQUIRY_INFO e left join RFQ_SUPPLIER_INFO q on q.ENQUIRY_NO = e.ENQUIRY_NO"
      numerator: "count(distinct q.ENQUIRY_NO)"
      denominator: "count(distinct e.ENQUIRY_NO)"
      filters: []
      time_field: "CREATED_TIME"
    data_source_id: "oracle_tms"
    owner: "admin"
    version: "1.0.0"
    synonyms: ["报价响应率", "询价响应率", "RFQ 响应率"]

