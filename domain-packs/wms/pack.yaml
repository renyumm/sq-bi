pack_id: wms
namespace: wms
name: WMS 仓储物流领域包
version: "1.0.0"
official: true
description: >
  基于当前 TMS Oracle 数据源中的 WMS 交付、出库物流和仓库组织数据，
  覆盖交付单、WMS 状态、物料、出库、仓库和客户分析。
author: sq-bi-team
min_engine_version: "0.1.0"
tags: ["wms", "warehouse", "logistics", "oracle"]

standard_fields:
  - field_id: delivery_id
    business_name: WMS 交付记录ID
    data_type: text
    description: WMS 交付信息的唯一标识
    required: true
  - field_id: wms_id
    business_name: 仓库ID
    data_type: text
    description: WMS 仓库唯一标识
    required: true
  - field_id: tms_deliver_no
    business_name: TMS 发货单号
    data_type: text
    description: WMS 交付记录关联的 TMS 发货单号
    required: true
  - field_id: wms_status
    business_name: WMS 状态
    data_type: enum
    description: WMS 交付处理状态
  - field_id: delivery_date
    business_name: 交付日期
    data_type: datetime
    description: WMS 交付业务日期
  - field_id: material_code
    business_name: 物料编码
    data_type: text
    description: 交付申请中的物料编码
  - field_id: order_no
    business_name: 订单号
    data_type: text
    description: WMS 交付关联的订单编号
  - field_id: warehouse_name
    business_name: 仓库名称
    data_type: text
    description: 仓库组织名称
  - field_id: warehouse_master_id
    business_name: 仓库主数据ID
    data_type: text
    description: 仓库组织主数据的唯一仓库标识
  - field_id: shipment_no
    business_name: 出货单号
    data_type: text
    description: WMS 物流出货单号
  - field_id: outbound_no
    business_name: 出库单号
    data_type: text
    description: WMS 物流出库单号
  - field_id: customer_name
    business_name: 客户名称
    data_type: text
    description: 物流交付客户名称
  - field_id: contract_no
    business_name: 合同号
    data_type: text
    description: WMS 交付关联的合同号

assets:
  - asset_type: semantic
    path: semantic/wms_semantic.yaml
    description: WMS Oracle 数据源的真实字段、指标、技能和报表
  - asset_type: skill
    path: skills/wms_operations/SKILL.md
    description: WMS 交付与出库物流问数 Skill
  - asset_type: field_mappings
    path: field_mappings/oracle_tms.yaml
    description: oracle_tms 中 WMS 真实表的默认字段映射

dependencies: []
