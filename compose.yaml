name: sq-bi

services:
  runtime:
    build:
      context: .
      dockerfile: deploy/Containerfile.backend
    command: ["uvicorn", "sq_bi_runtime.api:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: ${SQBI_ENV_FILE:-.env}
    environment:
      SQ_BI_STORAGE_PATH: /data
    volumes:
      - sqbi-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  export:
    build:
      context: .
      dockerfile: deploy/Containerfile.backend
    command: ["uvicorn", "sq_bi_export.api:app", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      SQ_BI_EXPORT_STORAGE_PATH: /data/export.sqlite3
    volumes:
      - sqbi-export-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: deploy/Containerfile.web
    ports:
      - "${SQBI_PORT:-8080}:80"
    depends_on:
      runtime:
        condition: service_healthy
      export:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  sqbi-data:
  sqbi-export-data:
