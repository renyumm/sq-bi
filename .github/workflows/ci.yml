name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: uv sync --all-packages --extra dev
      - run: npm ci
        working-directory: apps/web
      - run: ./scripts/test-all.sh
        env:
          # test-all also runs the frontend, installed in the next step
          CI: "true"
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: .pytest_cache
          if-no-files-found: ignore

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose model
        run: SQBI_ENV_FILE=.env.example docker compose --env-file .env.example config --quiet
      - name: Build production images
        run: SQBI_ENV_FILE=.env.example docker compose --env-file .env.example build
